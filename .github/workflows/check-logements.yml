name: Surveillance Logements CROUS

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  check-logements:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    
    - name: Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Installation
      run: pip install requests beautifulsoup4
    
    - name: Vérification
      run: python check_logements_github.py
    
    - name: Sauvegarde
      run: |
        git config user.name "GitHub Action"
        git config user.email "action@github.com"
        git add page_hash.txt
        git diff --quiet && git diff --staged --quiet || (git commit -m "Update hash" && git push)
